name: Build APKs

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build debug + release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.9"
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      # Generate wrapper on the fly so the repo doesn't need a committed wrapper jar.
      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.9

      # Fast static checks first — lint + unit tests block the (slower) APK
      # build. We don't need to compile the release variant to find out a test
      # is broken.
      - name: Lint
        run: ./gradlew lintDebug --stacktrace --no-daemon

      - name: Print lint failures
        if: failure()
        run: |
          echo "=== reports dir ==="
          ls -la app/build/reports/ 2>/dev/null || echo "(no reports dir)"
          echo "=== lint files ==="
          find app/build/reports -name 'lint-results-*' -print 2>/dev/null || true
          for f in $(find app/build/reports -name 'lint-results-*.xml' 2>/dev/null); do
            echo "::group::$f"
            cat "$f"
            echo "::endgroup::"
          done

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --stacktrace --no-daemon

      # Decode the release keystore so assembleRelease produces an APK
      # that's signature-compatible with the tagged GitHub Releases (and
      # with every previous CI build on the same branch). Without this
      # the release variant falls back to the runner's auto-generated
      # debug keystore — different on every run — and users get
      # INSTALL_FAILED_UPDATE_INCOMPATIBLE ("app is in conflict") trying
      # to update to the latest CI APK.
      #
      # Secret access rules:
      #   - Pushes to branches inside the repo (main, claude/**)  → have secrets, signed properly.
      #   - PRs from forks → no secrets by design; we skip the decode and let the debug-key
      #     fallback in build.gradle.kts handle it. Those builds aren't user-distributable anyway.
      - name: Decode release keystore
        id: keystore
        env:
          KEYSTORE_B64: ${{ secrets.MANGAKO_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::warning::MANGAKO_KEYSTORE_BASE64 not available (likely a fork PR); release APK will use the runner debug key."
            echo "have_keystore=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/mangako-release.jks"
          test -s "$RUNNER_TEMP/mangako-release.jks"
          echo "have_keystore=true" >> "$GITHUB_OUTPUT"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: app/build/reports/tests/**/*
          if-no-files-found: ignore

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            app/build/reports/lint-results-*.html
            app/build/reports/lint-results-*.xml
            app/build/reports/lint-results-*.txt
          if-no-files-found: ignore

      - name: Assemble debug
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Assemble release
        env:
          MANGAKO_KEYSTORE: ${{ steps.keystore.outputs.have_keystore == 'true' && format('{0}/mangako-release.jks', runner.temp) || '' }}
          MANGAKO_KEYSTORE_PASSWORD: ${{ secrets.MANGAKO_KEYSTORE_PASSWORD }}
          MANGAKO_KEY_ALIAS: ${{ secrets.MANGAKO_KEY_ALIAS }}
          MANGAKO_KEY_PASSWORD: ${{ secrets.MANGAKO_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: mangako-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: mangako-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

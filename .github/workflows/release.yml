name: Release

# Triggered on `v*` tag push. Builds a signed APK + AAB with the
# release keystore decoded from repo secrets and attaches both to a
# GitHub Release at the tag. See RELEASE.md for the secrets you need.
#
# `workflow_dispatch` is also enabled so you can re-run the workflow
# against an existing tag from the Actions tab if anything goes wrong
# the first time.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build, e.g. v0.1.0"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build signed APK + AAB
    runs-on: ubuntu-latest
    permissions:
      # Required to create / attach to the GitHub Release.
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Workflow_dispatch lets you target a specific tag; default
          # branch otherwise.
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.9"

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Decode keystore
        # GitHub secrets only round-trip text safely, so we ship the
        # .jks as a base64 blob and reconstruct it inside the runner.
        # The runner's filesystem is wiped between jobs so this never
        # leaks beyond this workflow execution.
        env:
          KEYSTORE_B64: ${{ secrets.MANGAKO_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::MANGAKO_KEYSTORE_BASE64 secret is not set."
            echo "See RELEASE.md → Configure CI release signing."
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/mangako-release.jks"
          test -s "$RUNNER_TEMP/mangako-release.jks"

      - name: Lint
        run: ./gradlew lintRelease --stacktrace --no-daemon

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --stacktrace --no-daemon

      - name: Bundle release (.aab) + Assemble release (.apk)
        env:
          MANGAKO_KEYSTORE: ${{ runner.temp }}/mangako-release.jks
          MANGAKO_KEYSTORE_PASSWORD: ${{ secrets.MANGAKO_KEYSTORE_PASSWORD }}
          MANGAKO_KEY_ALIAS: ${{ secrets.MANGAKO_KEY_ALIAS }}
          MANGAKO_KEY_PASSWORD: ${{ secrets.MANGAKO_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease assembleRelease --stacktrace --no-daemon

      - name: Stage release artefacts
        # Rename to versioned filenames so the GitHub Release page lists
        # them with the version in the URL — easier for users to share.
        run: |
          mkdir -p release
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          cp app/build/outputs/apk/release/*.apk \
             "release/mangako-$TAG.apk"
          cp app/build/outputs/bundle/release/*.aab \
             "release/mangako-$TAG.aab"
          ls -la release/

      - name: Upload artefacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: mangako-release
          path: release/*
          if-no-files-found: error

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          # Keep the auto-generated changelog from commits since the
          # previous tag — you can hand-edit on the Release page after.
          generate_release_notes: true
          files: release/*
          # Drafts let you review before users see it. Flip to false
          # once you're confident in the workflow.
          draft: true
          # Don't ever delete a published release; only update.
          fail_on_unmatched_files: true
